<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | IELTS Reading Masterclass</title>
    
    <!-- Epic & Academic Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- IELTS PRESTIGE THEME (OXFORD BLUE & GOLD) --- */
        :root {
            --bg: #03060d;
            --surface: rgba(10, 18, 35, 0.85);
            --surface-hover: rgba(212, 175, 55, 0.1);
            --border: rgba(212, 175, 55, 0.3);
            --accent: #D4AF37; /* Gold */
            --accent-glow: rgba(212, 175, 55, 0.4);
            --correct: #1DB954;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #A1A1AA;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 30% 20%, rgba(20, 35, 70, 0.4) 0%, rgba(3,6,13,1) 70%);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- AMBIENT ORBS --- */
        .ambient-orbs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.15; animation: floatOrb 20s infinite alternate ease-in-out; }
        .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -20%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #002244; bottom: -20%; right: -10%; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- HEADER & NAVIGATION --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px; padding: 0 40px;
            background: linear-gradient(to bottom, rgba(3,6,13,0.95), transparent);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--accent); }
        .level-badge { background: var(--accent); color: #000; font-family: var(--font-body); padding: 3px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 900; margin-left: 10px; letter-spacing: 1px; }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; padding: 0 50px;
            background: linear-gradient(to top, rgba(3,6,13,1), rgba(3,6,13,0.8)); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px);
        }

        .progress-container { position: absolute; bottom: -1px; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); font-size: 1.2rem;}
        .icon-btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        .btn {
            padding: 16px 40px; border: none; border-radius: 8px; font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1; width: 100%; max-width: 1200px; margin: 0 auto;
            padding-top: 100px; padding-bottom: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }
        
        .step {
            position: absolute; width: 100%; max-width: 950px;
            opacity: 0; pointer-events: none; transform: scale(0.96);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden; max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step::-webkit-scrollbar { width: 6px; }
        .step::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .step.active { opacity: 1; pointer-events: auto; transform: scale(1); visibility: visible; position: relative; }
        
        /* Modificador para Split Screen dar espaço extra */
        .step.split-mode { max-width: 1200px; }

        /* --- GLASSMORPHISM PANELS --- */
        .glass-panel {
            background: linear-gradient(135deg, rgba(15,25,45,0.85) 0%, rgba(5,10,25,0.95) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(212, 175, 55, 0.15);
            padding: 50px; position: relative; width: 100%;
        }

        h1 { font-family: var(--font-display); font-size: 4.5rem; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h2 { font-size: 2.2rem; color: var(--accent); display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-family: var(--font-display);}
        p { font-size: 1.15rem; color: var(--text-dim); margin-bottom: 20px; }
        .code-tag { font-family: var(--font-body); font-weight: 800; color: var(--accent); font-size: 0.8rem; background: rgba(212, 175, 55, 0.1); padding: 4px 12px; border-radius: 4px; letter-spacing: 2px; border: 1px solid rgba(212, 175, 55, 0.2); text-transform: uppercase; display: inline-block; margin-bottom: 15px;}

        .dual-panel { display: flex; gap: 50px; align-items: center; width: 100%; }
        .dual-panel > * { flex: 1; }

        /* --- SOLID ACCENT BOXES --- */
        .solid-accent-box {
            background: var(--accent) !important; color: #000 !important;
            box-shadow: 0 10px 30px var(--accent-glow); border: none;
        }
        .solid-accent-box h3, .solid-accent-box p, .solid-accent-box i, .solid-accent-box span { color: #000 !important; text-shadow: none !important; }

        /* --- SPLIT SCREEN READING --- */
        .split-reading { display: flex; gap: 30px; height: 65vh; width: 100%; align-items: stretch; }
        .passage-panel {
            flex: 1.2; background: #fdfdfd; color: #222; border-radius: 16px; padding: 40px;
            overflow-y: auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); font-family: 'Times New Roman', Times, serif; font-size: 1.15rem; line-height: 1.8; text-align: justify;
        }
        .passage-panel h3 { font-family: var(--font-body); text-align: center; color: #000; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; font-size: 1.5rem; }
        .passage-panel p { color: #222; margin-bottom: 15px; }
        .passage-panel .paragraph-letter { font-weight: bold; float: left; margin-right: 10px; font-size: 1.4rem; color: var(--accent); }
        
        .questions-panel {
            flex: 0.8; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }
        .instruction-tag { font-weight: 800; font-size: 0.85rem; color: #E50914; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; font-family: var(--font-code);}

        /* Multiple Choice & T/F/NG Buttons */
        .tfng-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .tfng-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 10px; color: #fff; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: var(--font-body); font-size: 0.9rem;}
        .tfng-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .tfng-btn.selected-correct { background: var(--correct); border-color: var(--correct); color: #000; pointer-events:none;}
        .tfng-btn.selected-wrong { background: var(--incorrect); border-color: var(--incorrect); color: #fff; pointer-events:none; animation: shake 0.4s;}

        select.tfng-btn { appearance: none; -webkit-appearance: none; outline: none; }
        select.tfng-btn option { background: #000; color: #fff; }

        /* --- SPEAKING HUB --- */
        .speaking-hub { margin-top: 20px; padding: 30px; background: rgba(212, 175, 55, 0.05); border-radius: 12px; border: 1px solid var(--accent-glow); position: relative; }
        .speaking-hub::before { content: '🗣️ EXAMINER COMMS'; position: absolute; top: -14px; left: 30px; background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem; font-weight: 900; padding: 6px 16px; border-radius: 4px; letter-spacing: 1px; box-shadow: 0 0 15px var(--accent-glow); }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.2rem; margin-bottom: 0; }
        .speaking-starters-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
        .speaking-starter { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); color: #EBEBEB; padding: 8px 18px; border-radius: 500px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none; }
        .speaking-starter:hover, .speaking-starter.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        /* --- EXERCISES (Grids, Words, Errors) --- */
        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 16px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .choice-card:hover { background: rgba(212, 175, 55, 0.08); border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);}
        
        .list-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .list-item { padding: 20px 30px; background: rgba(255,255,255,0.03); border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; color: #fff; }
        .list-item:hover { background: rgba(212, 175, 55, 0.08); border-color: var(--accent); transform: translateX(10px); }

        .vocab-word { color: var(--accent); font-weight: 800; cursor: pointer; border-bottom: 2px dashed var(--accent); transition: 0.3s;}
        .vocab-word:hover { color: #fff; border-color: #fff; text-shadow: 0 0 10px var(--accent-glow); }

        .drop-zone { min-height: 120px; border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 20px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 10px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.4); transition: 0.3s;}
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 30px rgba(29,185,84,0.15);}
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .word-chip { padding: 14px 24px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 500px; color: #fff; font-weight: 700; font-size: 1.05rem; cursor: pointer; user-select: none; transition: all 0.3s; backdrop-filter: blur(10px);}
        .word-chip:hover { border-color: var(--accent); background: rgba(212, 175, 55, 0.1); transform: translateY(-2px); color: var(--accent);}
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        .highlight-zone { padding: 35px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; font-size: 1.5rem; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}
        .error-sentence { font-size: 1.8rem; word-spacing: 5px; line-height: 2; font-weight: 600; text-align: center;}
        .error-word { display: inline-block; padding: 6px 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: rgba(212, 175, 55, 0.4); transform: scale(1.05); color: var(--accent);}

        .arena-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;}
        .arena-card { width: 280px; height: 380px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);}
        .arena-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; border-radius: 24px; }
        .card-front { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 5rem; color: var(--accent); backdrop-filter: blur(10px);}
        .card-back { background: var(--accent); transform: rotateY(180deg); color: #000; border: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .card-back h3 { color: #000; font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 10px; text-shadow: none;}
        .card-back p { color: #121212; font-weight: 600; font-size: 1.1rem; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }

        /* --- ASIDE PANELS --- */
        .vocab-panel {
            position: fixed; top: 0; right: -500px; width: 450px; height: 100vh;
            background: rgba(10,12,20,0.95); border-left: 1px solid rgba(255,255,255,0.05);
            z-index: 200; padding: 50px 40px; box-shadow: -20px 0 60px rgba(0,0,0,0.9);
            transition: right 0.5s cubic-bezier(0.3, 0, 0, 1);
            display: flex; flex-direction: column; gap: 30px; backdrop-filter: blur(30px);
        }
        .vocab-panel.open { right: 0; }
        .vocab-close { position: absolute; top: 30px; right: 30px; color: #fff; background: transparent; border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s;}
        .vocab-close:hover { background: var(--incorrect); border-color: var(--incorrect); transform: rotate(90deg); }

        .whiteboard-panel { position: fixed; bottom: 110px; right: 40px; width: 450px; height: 500px; background: rgba(5,10,20,0.95); border: 1px solid var(--border); border-radius: 16px; z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(30px); opacity: 0;}
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-display); font-size: 1rem; color: #fff; letter-spacing: 1px;}
        .wb-content { flex: 1; padding: 25px; outline: none; color: var(--accent); font-family: var(--font-code); font-size: 1.1rem; resize: none; border: none; background: transparent; line-height: 1.8;}

    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-book-open-reader" style="color:var(--accent); margin-right:8px;"></i> WOLF LABS <span>|</span> IELTS ACADEMIC READING</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Teacher's Whiteboard"><i class="fa-solid fa-chalkboard"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div style="font-family: var(--font-display); font-weight: 800; font-size: 1rem; color: var(--text-dim); letter-spacing: 3px;" id="step-counter">BAND 6.0+ (1/16)</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT STAGE <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <!-- ASIDE PANELS -->
    <aside class="vocab-panel" id="vocabPanel">
        <button class="vocab-close" onclick="closeVocab()"><i class="fa-solid fa-xmark"></i></button>
        <div id="asideContent">
            <p class="code-tag" style="margin-bottom: 10px; display: inline-block;">// ACADEMIC_GLOSSARY</p>
            <h2 id="vocab-title" style="font-size: 2.5rem; margin-bottom: 20px; color:#fff; font-family: var(--font-display);">Term</h2>
            <div class="glass-panel" style="padding: 30px; text-align: left; margin-bottom: 25px; border-radius: 16px; border-color: rgba(212, 175, 55, 0.3);">
                <p style="color: var(--accent); font-weight: 800; font-family: var(--font-code); margin-bottom: 10px; font-size: 0.85rem;">[DEFINITION]</p>
                <p id="vocab-def" style="color: #fff; margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6;">Definition text here.</p>
                <p style="color: var(--text-dim); font-weight: 800; font-family: var(--font-code); margin-bottom: 10px; font-size: 0.85rem;">[ACADEMIC_USAGE]</p>
                <p id="vocab-ex" style="font-family: var(--font-body); color: var(--text-dim); font-size: 1rem; line-height: 1.6; font-style: italic;">"Example sentence here."</p>
            </div>
            <div class="speaking-hub solid-accent-box" style="margin-top: 0;">
                <p id="vocab-speak" style="font-size:1.15rem;">Follow up question?</p>
            </div>
        </div>
    </aside>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-pen-nib" style="color:var(--accent); margin-right: 10px;"></i> Teacher's Board</span><button class="vocab-close" style="position:static; width: 35px; height: 35px;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="> Type IELTS grammar rules, synonyms, or corrections here..."></textarea>
    </aside>

    <script>
        // --- 1. VOCAB DATA ---
        const vocabData = {
            'demographic': { def: 'Relating to the structure of populations (age, birth rates, etc).', ex: 'Current demographic trends show an aging population.', speak: 'What demographic group do you belong to?' },
            'drawback': { def: 'A disadvantage or the negative part of a situation.', ex: 'The main drawback of the plan is the high cost.', speak: 'What is a drawback of living in a big city?' },
            'cutting-edge': { def: 'Very modern and with all the newest features.', ex: 'The new laboratory uses cutting-edge technology.', speak: 'Name one piece of cutting-edge technology you use daily.' },
            'accommodate': { def: 'To provide enough space or adapt to fit someone/something.', ex: 'We need to build new homes to accommodate the growing population.', speak: 'Can your house accommodate guests for the weekend?' },
            'synonym': { def: 'A word or phrase that means exactly or nearly the same as another word.', ex: 'A synonym for "fast" is "quick".', speak: 'Why are synonyms so important in the IELTS test?' }
        };

        // --- 2. LESSON CONTENT (16 STEPS) ---
        const stepsData = [
            // 0: GUIDE
            `<div class="glass-panel" style="max-width: 850px; margin: 0 auto;">
                <h2><i class="fa-solid fa-user-shield"></i> Examiner Guide: Reading Module</h2>
                <div style="border-left: 4px solid var(--accent); padding-left: 25px; margin: 30px 0; background: rgba(212, 175, 55, 0.05); padding-top: 20px; padding-bottom: 20px; border-radius: 0 12px 12px 0;">
                    <p style="font-family: var(--font-code); color: var(--accent); margin-bottom: 10px;">/* MISSION BRIEFING */</p>
                    <p><strong>Topic:</strong> IELTS Reading (Computer-Delivered Simulation).</p>
                    <p><strong>Target Band:</strong> 6.0 - 6.5 (Intermediate-Advanced)</p>
                    <p><strong>Mechanics:</strong> This is a 1-hour Masterclass. It integrates Pre-teaching (Vocabulary), Split-Screen Reading, Synonym Analysis, and The Arena (Debate). Focus on ensuring the student speaks for 80% of the time.</p>
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p0')"><i class="fa-solid fa-eye"></i> Initialize System</button>
                <div class="speaking-hub" id="p0" style="display:none;">
                    <p>Teacher: "The biggest enemy in IELTS Reading isn't the vocabulary. It's the clock. Let's learn how to beat it."</p>
                </div>
            </div>`,
            
            // 1: HERO
            `<div class="glass-panel" style="width: 100%; background: transparent; border: none; box-shadow: none; padding: 0;">
                <div class="dual-panel" style="align-items: center;">
                    <div style="flex: 1.2;">
                        <span class="code-tag">IELTS READING | STRATEGY LAB</span>
                        <h1 style="font-size: 4.5rem; margin-top: 10px;">Reading<br>Architect</h1>

                    <span style="color:var(--accent); font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 20px;"><i class="fa-solid fa-database"></i> Session Data</span>
                    <ul style="color:#fff; list-style:none; font-size: 1.2rem; line-height: 2;">
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> Split-Screen Mastery</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> Synonym Recognition</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> T/F/NG Traps Avoided</li>
                    </ul>
                </div>
                <button class="btn btn-accent" style="padding: 20px 60px; font-size: 1.3rem;" onclick="alert('Data synced. Ready for next module.')"><i class="fa-solid fa-upload"></i> Close Session</button>
            </div>`
        ];

        // --- CORE LOGIC ---
        let currentStep = 0;
        const totalSteps = stepsData.length;
        const mainContainer = document.getElementById('main-container');
        let globalScore = 0;

        function initializeSteps() {
            mainContainer.innerHTML = '';
            stepsData.forEach((htmlContent, index) => {
                const section = document.createElement('section');
                section.className = 'step';
                if (htmlContent.includes('<!-- split-mode -->')) {
                    section.classList.add('split-mode');
                }
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach((step, index) => {
                if(index === currentStep) step.classList.add('active');
                else step.classList.remove('active');
            });

            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === totalSteps - 1 ? 'none' : 'block';
            document.getElementById('step-counter').innerText = `BAND 6.0+ (${currentStep + 1}/${totalSteps})`;
            
            const pb = document.getElementById('progressBar');
            if (pb) pb.style.width = `${((currentStep + 1) / totalSteps) * 100}%`;

            mainContainer.scrollTo(0, 0);
        }

        function nextStep() { if (currentStep < totalSteps - 1) { currentStep++; updateUI(); closeVocab(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; updateUI(); closeVocab(); } }
        function unlockPrompt(id) { const el = document.getElementById(id); if(el) el.style.display = 'block'; }

        // Logic for Matching Headings (Select dropdowns)
        window.checkHeadings = function(btn, promptId) {
            const container = btn.parentElement;
            const selects = container.querySelectorAll('.heading-select');
            let allGood = true;
            let attempts = parseInt(container.dataset.attempts || '0');

            selects.forEach(select => {
                if(select.disabled) return;
                if(select.value === select.dataset.answer) {
                    select.style.borderColor = 'var(--correct)';
                    select.style.backgroundColor = 'rgba(29, 185, 84, 0.1)';
                    select.disabled = true;
                    globalScore++;
                } else {
                    select.style.borderColor = 'var(--incorrect)';
                    select.style.animation = 'shake 0.4s';
                    allGood = false;
                    setTimeout(() => { select.style.animation = ''; }, 400);
                }
            });

            if(allGood) {
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.innerText = 'Answers Locked';
                btn.style.pointerEvents = 'none';
                unlockPrompt(promptId);
            } else {
                attempts++;
                container.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.innerText = 'Try Again';
                
                setTimeout(() => {
                    if(attempts < 2) {
                        btn.style.backgroundColor = 'var(--accent)';
                        btn.style.color = '#000';
                        btn.innerText = 'Verify Headings';
                    }
                }, 1000);

                // Auto solve
                if(attempts >= 2) {
                    selects.forEach(select => {
                        if(!select.disabled) {
                            select.value = select.dataset.answer;
                            select.style.borderColor = 'var(--correct)';
                            select.style.backgroundColor = 'rgba(29, 185, 84, 0.1)';
                            select.disabled = true;
                        }
                    });
                    btn.style.backgroundColor = 'var(--correct)';
                    btn.style.color = '#000';
                    btn.innerText = 'Auto-Solved';
                    btn.style.pointerEvents = 'none';
                    unlockPrompt(promptId);
                }
            }
        }

        // Logic for T/F/NG
        window.selectTFNG = function(btn, isCorrect) {
            const grid = btn.parentElement;
            const parent = grid.parentElement;
            if(parent.dataset.scored === "true") return;

            Array.from(grid.children).forEach(b => {
                b.classList.remove('selected-correct', 'selected-wrong');
                b.style.opacity = '1';
            });

            Array.from(grid.children).forEach(b => { if(b !== btn) b.style.opacity = '0.3'; });
            
            if(isCorrect) {
                btn.classList.add('selected-correct');
                btn.dataset.isRight = "true";
            } else {
                btn.classList.add('selected-wrong');
                btn.dataset.isRight = "false";
            }
            grid.dataset.answered = "true";
        }

        window.checkTFNG = function(btn, promptId) {
            const container = btn.parentElement;
            const questions = container.querySelectorAll('.tfng-question');
            let allGood = true;
            let attempts = parseInt(container.dataset.attempts || '0');

            questions.forEach(q => {
                if(q.dataset.scored === "true") return;
                const grid = q.querySelector('.tfng-grid');
                if(grid.dataset.answered !== "true") { allGood = false; return; }

                const selectedBtn = Array.from(grid.children).find(b => b.classList.contains('selected-correct') || b.classList.contains('selected-wrong'));
                
                if(selectedBtn && selectedBtn.dataset.isRight === "true") {
                    // Correct!
                } else {
                    allGood = false;
                }
            });

            if(allGood) {
                questions.forEach(q => {
                    if(q.dataset.scored !== "true") {
                        globalScore++;
                        q.dataset.scored = "true";
                    }
                });
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.innerText = 'Answers Locked';
                btn.style.pointerEvents = 'none';
                unlockPrompt(promptId);
            } else {
                attempts++;
                container.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.innerText = 'Try Again';

                questions.forEach(q => {
                    if(q.dataset.scored !== "true") {
                        const grid = q.querySelector('.tfng-grid');
                        Array.from(grid.children).forEach(b => {
                            b.classList.remove('selected-wrong', 'selected-correct');
                            b.style.opacity = '1';
                            b.style.pointerEvents = 'auto';
                        });
                        grid.dataset.answered = "false";
                    }
                });

                setTimeout(() => {
                    if(attempts < 2) {
                        btn.style.backgroundColor = 'var(--accent)';
                        btn.style.color = '#000';
                        btn.innerText = 'Verify Answers';
                    }
                }, 1000);

                if(attempts >= 2) {
                    questions.forEach(q => {
                        if(q.dataset.scored !== "true") {
                            const grid = q.querySelector('.tfng-grid');
                            const correctBtn = Array.from(grid.children).find(b => b.getAttribute('onclick').includes('true'));
                            if(correctBtn) {
                                correctBtn.classList.add('selected-correct');
                                Array.from(grid.children).forEach(b => {
                                    if(b !== correctBtn) b.style.opacity = '0.3';
                                    b.style.pointerEvents = 'none';
                                });
                            }
                            q.dataset.scored = "true";
                        }
                    });
                    btn.style.backgroundColor = 'var(--correct)';
                    btn.style.color = '#000';
                    btn.innerText = 'Auto-Solved';
                    btn.style.pointerEvents = 'none';
                    unlockPrompt(promptId);
                }
            }
        }

        function genericCorrect(btn, isCorrect, promptIdStr) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('div, button, span')).filter(b => b.hasAttribute('onclick') && b.getAttribute('onclick').includes('genericCorrect'));
            const maxAttempts = Math.min(3, options.length - 1);
            let promptIdToUnlock = promptIdStr;

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--correct)';
                if (promptIdToUnlock) unlockPrompt(promptIdToUnlock);
            } else {
                attempts++; parent.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--incorrect)'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (attempts >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    const correctBtn = options.find(b => b.getAttribute('onclick') && b.getAttribute('onclick').includes('true'));
                    if (correctBtn) { correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)'; }
                    if (promptIdToUnlock) setTimeout(() => unlockPrompt(promptIdToUnlock), 500);
                }
            }
        }

        let buildState = {};
        function moveWord(chip, dzId, targetArrayJson, promptId) {
            if(chip.classList.contains('used')) return;
            const targetArray = JSON.parse(targetArrayJson.replace(/'/g, '"'));
            const word = chip.innerText;
            const dz = document.getElementById(dzId);
            
            const newChip = document.createElement('div');
            newChip.className = 'word-chip'; 
            newChip.innerText = word;
            
            if (!chip.id) chip.id = 'chip_' + Math.random().toString(36).substr(2, 9);
            newChip.dataset.sourceId = chip.id;
            newChip.onclick = function() {
                if(dz.classList.contains('success')) return;
                dz.removeChild(this);
                document.getElementById(this.dataset.sourceId).classList.remove('used');
                const idx = buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) buildState[dzId].splice(idx, 1);
            };

            dz.appendChild(newChip); chip.classList.add('used');
            if(!buildState[dzId]) buildState[dzId] = [];
            buildState[dzId].push(word);

            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success'); 
                    Array.from(dz.children).forEach(c => { c.style.background = 'var(--correct)'; c.style.color = '#000'; c.style.cursor = 'default'; c.style.borderColor = 'var(--correct)'; });
                    unlockPrompt(promptId);
                } else {
                    let attempts = parseInt(dz.dataset.attempts || '0') + 1;
                    dz.dataset.attempts = attempts;
                    dz.style.borderColor = 'var(--incorrect)'; dz.style.animation = 'shake 0.4s';
                    
                    if (attempts >= 3) {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = ''; dz.style.animation = ''; dz.classList.add('success');
                            targetArray.forEach(w => {
                                const finalChip = document.createElement('div');
                                finalChip.className = 'word-chip'; finalChip.style.background = 'var(--correct)'; finalChip.style.color = '#000'; finalChip.style.borderColor = 'var(--correct)'; finalChip.innerText = w;
                                dz.appendChild(finalChip);
                            });
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.add('used'));
                            setTimeout(() => unlockPrompt(promptId), 500);
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = 'rgba(255,255,255,0.2)'; dz.style.animation = ''; buildState[dzId] = [];
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
                        }, 1000);
                    }
                }
            }
        }

        let matchS1 = null; let matchesF1 = 0;
        function handleMatch(card, matchVarName, matchesFoundVarName, targetMatches, promptId) {
            if(card.style.opacity === '0') return;
            if(!window[matchVarName]) { window[matchVarName] = card; card.style.borderColor = 'var(--accent)'; }
            else {
                if(window[matchVarName].dataset.val === card.dataset.val && window[matchVarName] !== card) { 
                    window[matchVarName].style.opacity = '0'; card.style.opacity = '0'; 
                    window[matchesFoundVarName]++;
                    if(window[matchesFoundVarName] === targetMatches) unlockPrompt(promptId);
                } else { 
                    window[matchVarName].style.borderColor = 'var(--border)'; card.style.animation = 'shake 0.4s'; 
                    setTimeout(() => card.style.animation = '', 400);
                }
                window[matchVarName] = null;
            }
        }

        function flipCard(card, promptId) {
            if(!card.classList.contains('flipped')) { card.classList.add('flipped'); unlockPrompt(promptId); }
        }

        function openVocab(word, promptId) {
            const data = {
                'demographic': { def: 'Relating to the structure of populations (age, birth rates, etc).', ex: 'Current demographic trends show an aging population.', speak: 'What demographic group do you belong to?' },
                'drawback': { def: 'A disadvantage or the negative part of a situation.', ex: 'The main drawback of the plan is the high cost.', speak: 'What is a drawback of living in a big city?' },
                'cutting-edge': { def: 'Very modern and with all the newest features.', ex: 'The new laboratory uses cutting-edge technology.', speak: 'Name one piece of cutting-edge technology you use daily.' },
                'accommodate': { def: 'To provide enough space or adapt to fit someone/something.', ex: 'We need to build new homes to accommodate the growing population.', speak: 'Can your house accommodate guests for the weekend?' },
                'synonym': { def: 'A word or phrase that means exactly or nearly the same as another word.', ex: 'A synonym for "fast" is "quick".', speak: 'Why are synonyms so important in the IELTS test?' }
            }[word];
            if(data) {
                document.getElementById('vocab-title').innerText = word;
                document.getElementById('vocab-def').innerText = data.def;
                document.getElementById('vocab-ex').innerText = `"${data.ex}"`;
                document.getElementById('vocab-speak').innerText = data.speak;
                document.getElementById('vocabPanel').classList.add('open');
                if (promptId) unlockPrompt(promptId);
            }
        }

        function closeVocab() { document.getElementById('vocabPanel').classList.remove('open'); }
        function toggleWhiteboard() { document.getElementById('whiteboardPanel').classList.toggle('open'); }
        function toggleFullscreen() { try { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } else { document.exitFullscreen(); } } catch (err) {} }

        window.onload = initializeSteps;
    </script>
